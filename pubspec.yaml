name: clearskies
description: "Clear sky forecast for telescope and stargazing planning."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP + caching
  dio: ^5.8.0
  dio_cache_interceptor: ^3.5.0

  # UI
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.5

  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
